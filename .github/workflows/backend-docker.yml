name: Backend Docker

on:
  push:
    branches: [develop, stage, main]
    paths:
      - "apps/api/**"
      - "packages/**"
      - "infra/docker/**"
      - "package-lock.json"

concurrency:
  group: backend-docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          # TODO: Add router and subgraph services when Dockerfiles exist
          - service: api
            package: "@stock-tracker/api"
            dir: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Resolve tags
        id: tags
        run: |
          SHA="${{ github.sha }}"
          BRANCH="${GITHUB_REF#refs/heads/}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/stock-tracker-${{ matrix.service }}"
          echo "tags=${IMAGE}:${SHA},${IMAGE}:${BRANCH}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/node-service.Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            PACKAGE_NAME=${{ matrix.package }}
            APP_DIR=${{ matrix.dir }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install redeploy deps
        run: npm install --prefix infra/railway

      - name: Resolve Railway environment
        id: env
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [[ "$BRANCH" == "main" ]]; then
            echo "railway_env=production" >> "$GITHUB_OUTPUT"
          else
            echo "railway_env=$BRANCH" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Railway redeploy
        run: npx --prefix infra/railway tsx infra/railway/src/redeploy.ts ${{ steps.env.outputs.railway_env }}
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
