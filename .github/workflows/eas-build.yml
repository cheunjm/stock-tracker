name: EAS Build

on:
  push:
    branches: [develop, stage, main]
    paths:
      - "apps/mobile/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"

concurrency:
  group: eas-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [android, ios]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write Apple API key
        if: matrix.platform == 'ios'
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.EXPO_APPLE_P8_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.EXPO_APPLE_KEY_ID }}.p8

      - name: Resolve build profile
        id: profile
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "profile=production" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == "refs/heads/stage" ]]; then
            echo "profile=preview" >> "$GITHUB_OUTPUT"
          else
            echo "profile=development" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: |
          eas build \
            --profile ${{ steps.profile.outputs.profile }} \
            --platform ${{ matrix.platform }} \
            --non-interactive
        working-directory: apps/mobile
        env:
          EXPO_APPLE_KEY_ID: ${{ secrets.EXPO_APPLE_KEY_ID }}
          EXPO_APPLE_ISSUER_ID: ${{ secrets.EXPO_APPLE_ISSUER_ID }}
