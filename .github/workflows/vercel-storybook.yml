name: Deploy Storybook

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/src/**/*.stories.tsx"
      - "apps/storybook/**"
      - "packages/**"

concurrency:
  group: storybook-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: "@aramiworks"

      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build packages
        run: npx turbo run build --filter=@stock-tracker/validation --filter=@stock-tracker/types

      - name: Build Storybook
        run: npx turbo run build --filter=@stock-tracker/storybook

      - name: Configure Vercel project
        working-directory: apps/storybook/storybook-static
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_STORYBOOK_PROJECT_ID }}
        run: |
          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > .vercel/project.json

      - name: Resolve Vercel flags
        id: flags
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "prod=--prod" >> "$GITHUB_OUTPUT"
          else
            echo "prod=" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy
        id: deploy
        run: |
          DEPLOY_URL=$(npx vercel deploy --yes ${{ steps.flags.outputs.prod }} \
            --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
        working-directory: apps/storybook/storybook-static

      - name: Set branch alias
        if: github.ref != 'refs/heads/main'
        run: |
          BRANCH="${{ github.ref_name }}"
          npx vercel alias set "${{ steps.deploy.outputs.url }}" \
            "${BRANCH}.storybook.stocktracker.arami.so" \
            --token="${{ secrets.VERCEL_TOKEN }}"
        working-directory: apps/storybook/storybook-static

      - name: Deployment summary
        run: |
          echo "### Storybook deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "URL: ${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ github.ref }}" != "refs/heads/main" ]]; then
            echo "Alias: https://${{ github.ref_name }}.storybook.stocktracker.arami.so" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Alias: https://storybook.stocktracker.arami.so" >> "$GITHUB_STEP_SUMMARY"
          fi
