procs:
  api:
    cmd:
      [
        "doppler",
        "run",
        "--project",
        "stock-tracker",
        "--config",
        "dev_local",
        "--",
        "npm",
        "run",
        "dev:api",
      ]
    autostart: true

  subgraph:
    cmd:
      [
        "doppler",
        "run",
        "--project",
        "stock-tracker",
        "--config",
        "dev_local",
        "--",
        "npm",
        "run",
        "dev:subgraph",
      ]
    autostart: true

  router:
    cmd:
      [
        "doppler",
        "run",
        "--project",
        "stock-tracker",
        "--config",
        "dev_local",
        "--",
        "rover",
        "dev",
        "--supergraph-config",
        "supergraph.yaml",
        "--router-config",
        "router.yaml",
      ]
    cwd: apps/router
    autostart: true

  mobile:
    cmd:
      [
        "doppler",
        "run",
        "--project",
        "stock-tracker",
        "--config",
        "dev_local",
        "--",
        "npm",
        "run",
        "dev:mobile",
      ]
    autostart: true

  storybook:
    cmd:
      [
        "doppler",
        "run",
        "--project",
        "stock-tracker",
        "--config",
        "dev_local",
        "--",
        "npm",
        "run",
        "dev:storybook",
      ]
    autostart: false
