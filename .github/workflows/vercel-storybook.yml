name: Deploy Storybook

on:
  push:
    branches: [main, develop, stage]
    paths:
      - "apps/mobile/src/**/*.stories.tsx"
      - "apps/storybook/**"
      - "packages/**"

concurrency:
  group: storybook-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build packages
        run: npx turbo run build --filter=@stock-tracker/validation --filter=@stock-tracker/types

      - name: Build Storybook
        run: npx turbo run build --filter=@stock-tracker/storybook

      - name: Link project
        run: npx vercel link --yes --token=${{ secrets.VERCEL_TOKEN }} --scope ${{ secrets.VERCEL_ORG_ID }} --project stock-tracker-storybook
        working-directory: apps/storybook/storybook-static

      - name: Resolve Vercel flags
        id: flags
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "prod=--prod" >> "$GITHUB_OUTPUT"
          else
            echo "prod=" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy
        id: deploy
        run: |
          DEPLOY_URL=$(npx vercel deploy --yes ${{ steps.flags.outputs.prod }} \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope ${{ secrets.VERCEL_ORG_ID }})
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
        working-directory: apps/storybook/storybook-static

      - name: Set branch alias
        if: github.ref != 'refs/heads/main'
        run: |
          BRANCH="${{ github.ref_name }}"
          npx vercel alias set "${{ steps.deploy.outputs.url }}" \
            "${BRANCH}.storybook.stocktracker.arami.so" \
            --token="${{ secrets.VERCEL_TOKEN }}" \
            --scope "${{ secrets.VERCEL_ORG_ID }}"
        working-directory: apps/storybook/storybook-static

      - name: Deployment summary
        run: |
          echo "### Storybook deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "URL: ${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ github.ref }}" != "refs/heads/main" ]]; then
            echo "Alias: https://${{ github.ref_name }}.storybook.stocktracker.arami.so" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Alias: https://storybook.stocktracker.arami.so" >> "$GITHUB_STEP_SUMMARY"
          fi
