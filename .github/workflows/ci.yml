name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

env:
  NODE_VERSION: 20
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      prisma: ${{ steps.filter.outputs.prisma }}
      migrations: ${{ steps.filter.outputs.migrations }}
      subgraphs: ${{ steps.filter.outputs.subgraphs }}
      dockerfiles: ${{ steps.filter.outputs.dockerfiles }}
      stories: ${{ steps.filter.outputs.stories }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            prisma:
              - 'packages/prisma/**'
            migrations:
              - 'packages/prisma/migrations/**'
            subgraphs:
              - 'apps/subgraphs/**'
            dockerfiles:
              - 'apps/subgraphs/*/Dockerfile'
              - 'apps/service-*/Dockerfile'
            stories:
              - 'apps/mobile/src/**/*.stories.tsx'
              - 'apps/storybook/**'
              - 'packages/ui/**'

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run lint

  check-types:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run check-types

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run test -- -- --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: test-results
          JEST_JUNIT_OUTPUT_NAME: junit.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/test-results/"
          if-no-files-found: ignore
          retention-days: 7
      - name: Test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit Tests
          path: "**/test-results/*.xml"
          reporter: jest-junit
          fail-on-empty: false
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  format:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run format:check

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run build

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npm audit --audit-level=critical --omit=dev --omit=optional

  visual:
    needs: [changes]
    if: needs.changes.outputs.stories == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Storybook
        run: npx turbo run build --filter=@stock-tracker/storybook
      - name: Publish to Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          storybookBuildDir: apps/storybook/storybook-static
          exitOnceUploaded: true

  prisma:
    needs: [changes]
    if: needs.changes.outputs.prisma == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npx prisma validate --schema packages/prisma/prisma/schema
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
      - run: npx prisma format --check --schema packages/prisma/prisma/schema

  migration:
    needs: [changes]
    if: needs.changes.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply migrations
        run: npx prisma migrate deploy --schema packages/prisma/prisma/schema
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/test
      - name: Check schema-migration sync
        run: npx prisma migrate diff --from-migrations ./packages/prisma/prisma/migrations --to-schema-datamodel ./packages/prisma/prisma/schema --exit-code
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/test

  schema-check:
    needs: [changes]
    if: needs.changes.outputs.subgraphs == 'true' && vars.APOLLO_GRAPH_REF != ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build subgraphs
        run: npx turbo run build --filter='./apps/subgraphs/*'
      - name: Cache Rover CLI
        id: rover-cache
        uses: actions/cache@v4
        with:
          path: ~/.rover/bin
          key: rover-${{ runner.os }}
      - name: Install Rover
        if: steps.rover-cache.outputs.cache-hit != 'true'
        run: curl -sSL https://rover.apollo.dev/nix/latest | sh
      - name: Check schema
        run: ~/.rover/bin/rover subgraph check $APOLLO_GRAPH_REF --schema ./apps/subgraphs/*/schema.graphql --name stock-tracker
        env:
          APOLLO_KEY: ${{ secrets.APOLLO_KEY }}
          APOLLO_GRAPH_REF: ${{ vars.APOLLO_GRAPH_REF }}

  docker:
    needs: [changes]
    if: needs.changes.outputs.dockerfiles == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Find Dockerfiles
        id: dockerfiles
        run: echo "files=$(find apps/subgraphs apps/service-* -name Dockerfile 2>/dev/null | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
      - name: Build Docker images
        if: steps.dockerfiles.outputs.files != ''
        run: |
          for df in ${{ steps.dockerfiles.outputs.files }}; do
            app_dir=$(dirname "$df")
            app_name=$(basename "$app_dir")
            echo "Building $app_name..."
            docker buildx build --file "$df" --load -t "$app_name:ci" .
          done
