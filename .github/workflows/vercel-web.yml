name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"

concurrency:
  group: web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build packages
        run: npx turbo run build --filter=@stock-tracker/validation --filter=@stock-tracker/types

      - name: Export web
        run: npx expo export --platform web
        working-directory: apps/mobile

      - name: Copy Vercel config
        run: cp apps/mobile/vercel.json apps/mobile/dist/vercel.json

      - name: Link project
        run: npx vercel link --yes --token=${{ secrets.VERCEL_TOKEN }} --scope ${{ secrets.VERCEL_ORG_ID }} --project stock-tracker-web
        working-directory: apps/mobile/dist

      - name: Resolve Vercel flags
        id: flags
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "prod=--prod" >> "$GITHUB_OUTPUT"
          else
            echo "prod=" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy
        id: deploy
        run: |
          DEPLOY_URL=$(npx vercel deploy --yes ${{ steps.flags.outputs.prod }} \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope ${{ secrets.VERCEL_ORG_ID }})
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
        working-directory: apps/mobile/dist

      - name: Set branch alias
        if: github.ref != 'refs/heads/main'
        run: |
          BRANCH="${{ github.ref_name }}"
          npx vercel alias set "${{ steps.deploy.outputs.url }}" \
            "${BRANCH}.app.stocktracker.arami.so" \
            --token="${{ secrets.VERCEL_TOKEN }}" \
            --scope "${{ secrets.VERCEL_ORG_ID }}"
        working-directory: apps/mobile/dist

      - name: Deployment summary
        run: |
          echo "### Web deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "URL: ${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ github.ref }}" != "refs/heads/main" ]]; then
            echo "Alias: https://${{ github.ref_name }}.app.stocktracker.arami.so" >> "$GITHUB_STEP_SUMMARY"
          fi
