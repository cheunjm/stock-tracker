name: Backend Docker

on:
  push:
    branches: [develop, stage, main]
    paths:
      - "apps/api/**"
      - "packages/**"
      - "infra/docker/**"
      - "package-lock.json"

concurrency:
  group: backend-docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: api
            package: "@stock-tracker/api"
            dir: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Resolve tags
        id: tags
        run: |
          SHA="${{ github.sha }}"
          BRANCH="${GITHUB_REF#refs/heads/}"
          IMAGE="ghcr.io/cheunjm/stock-tracker-${{ matrix.service }}"
          echo "tags=${IMAGE}:${SHA},${IMAGE}:${BRANCH}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/node-service.Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            PACKAGE_NAME=${{ matrix.package }}
            APP_DIR=${{ matrix.dir }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
