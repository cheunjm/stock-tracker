name: Backend Docker

on:
  workflow_dispatch:
  push:
    branches: [main, develop, stage]
    paths:
      - "apps/api/**"
      - "apps/subgraphs/**"
      - "apps/router/**"
      - "packages/**"
      - "infra/docker/**"
      - "package-lock.json"

concurrency:
  group: backend-docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          - service: api
            package: "@stock-tracker/api"
            dir: apps/api
            dockerfile: infra/docker/node-service.Dockerfile
          - service: subgraph-tracker
            package: "@stock-tracker/subgraph-tracker"
            dir: apps/subgraphs/tracker
            dockerfile: infra/docker/node-service.Dockerfile
          - service: router
            package: ""
            dir: ""
            dockerfile: apps/router/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Resolve tags
        id: tags
        run: |
          SHA="${{ github.sha }}"
          BRANCH="${{ github.ref_name }}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/stock-tracker-${{ matrix.service }}"
          if [ "$BRANCH" = "main" ]; then
            ENV_TAG="latest"
          else
            ENV_TAG="$BRANCH"
          fi
          echo "tags=${IMAGE}:${SHA},${IMAGE}:${ENV_TAG}" >> "$GITHUB_OUTPUT"

      - name: Resolve build args
        id: build-args
        if: matrix.package != ''
        run: |
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "args<<$EOF" >> "$GITHUB_OUTPUT"
          echo "PACKAGE_NAME=${{ matrix.package }}" >> "$GITHUB_OUTPUT"
          echo "APP_DIR=${{ matrix.dir }}" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: ${{ steps.build-args.outputs.args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install redeploy deps
        run: npm install --prefix infra/railway

      - name: Resolve Railway environment
        id: env
        run: |
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            echo "name=production" >> "$GITHUB_OUTPUT"
          else
            echo "name=$BRANCH" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Railway redeploy
        run: npx --prefix infra/railway tsx infra/railway/src/redeploy.ts ${{ steps.env.outputs.name }}
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
