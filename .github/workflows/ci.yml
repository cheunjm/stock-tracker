name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main, develop]

env:
  NODE_VERSION: 20

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      prisma: ${{ steps.filter.outputs.prisma }}
      migrations: ${{ steps.filter.outputs.migrations }}
      subgraphs: ${{ steps.filter.outputs.subgraphs }}
      dockerfiles: ${{ steps.filter.outputs.dockerfiles }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            prisma:
              - 'packages/prisma/**'
            migrations:
              - 'packages/prisma/migrations/**'
            subgraphs:
              - 'apps/subgraph-*/**'
            dockerfiles:
              - 'apps/subgraph-*/Dockerfile'
              - 'apps/service-*/Dockerfile'
              - 'apps/subgraph-*/**'
              - 'apps/service-*/**'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint

  check-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run check-types

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run test

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run format:check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=critical --omit=dev

  visual:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Build Storybook
        run: npx turbo run build --filter=@stock-tracker/storybook
      - name: Install Playwright browsers
        run: npx -y playwright@1.47.2 install --with-deps chromium
      - name: Run Lost Pixel
        run: npx lost-pixel
      - name: Upload visual diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lost-pixel-diffs
          path: .lostpixel/

  prisma:
    needs: [changes]
    if: needs.changes.outputs.prisma == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma validate
      - run: npx prisma format --check

  migration:
    needs: [changes]
    if: needs.changes.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Apply migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/test
      - name: Check schema-migration sync
        run: npx prisma migrate diff --from-migrations ./prisma/migrations --to-schema-datamodel ./prisma/schema --exit-code
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/test

  schema-check:
    needs: [changes]
    if: needs.changes.outputs.subgraphs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Build subgraphs
        run: npx turbo run build --filter='./apps/subgraph-*'
      - name: Cache Rover CLI
        id: rover-cache
        uses: actions/cache@v4
        with:
          path: ~/.rover/bin
          key: rover-${{ runner.os }}
      - name: Install Rover
        if: steps.rover-cache.outputs.cache-hit != 'true'
        run: curl -sSL https://rover.apollo.dev/nix/latest | sh
      - name: Check schema
        run: ~/.rover/bin/rover subgraph check $APOLLO_GRAPH_REF --schema ./apps/subgraph-*/schema.graphql --name stock-tracker
        env:
          APOLLO_KEY: ${{ secrets.APOLLO_KEY }}
          APOLLO_GRAPH_REF: ${{ vars.APOLLO_GRAPH_REF }}

  docker:
    needs: [changes]
    if: needs.changes.outputs.dockerfiles == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Find Dockerfiles
        id: dockerfiles
        run: echo "files=$(find apps/subgraph-* apps/service-* -name Dockerfile 2>/dev/null | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
      - name: Build Docker images
        if: steps.dockerfiles.outputs.files != ''
        run: |
          for df in ${{ steps.dockerfiles.outputs.files }}; do
            app_dir=$(dirname "$df")
            app_name=$(basename "$app_dir")
            echo "Building $app_name..."
            docker buildx build --file "$df" --load -t "$app_name:ci" .
          done
