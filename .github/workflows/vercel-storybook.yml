name: Deploy Storybook

on:
  push:
    branches: [develop, stage, main]
    paths:
      - "apps/mobile/src/**/*.stories.tsx"
      - "apps/storybook/**"
      - "packages/**"

concurrency:
  group: storybook-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build Storybook
        run: npx turbo run build --filter=@stock-tracker/storybook

      - name: Resolve Vercel flags
        id: flags
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "prod=--prod" >> "$GITHUB_OUTPUT"
          else
            echo "prod=" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy
        id: deploy
        run: |
          DEPLOY_URL=$(npx vercel deploy --yes ${{ steps.flags.outputs.prod }} \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope ${{ secrets.VERCEL_ORG_ID }})
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
        working-directory: apps/storybook/storybook-static

      - name: Deployment summary
        run: |
          echo "### Storybook deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "URL: ${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
