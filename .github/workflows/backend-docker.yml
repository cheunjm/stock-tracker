name: Backend Docker

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/subgraphs/**"
      - "apps/router/**"
      - "packages/**"
      - "infra/docker/**"
      - "package-lock.json"

concurrency:
  group: backend-docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          - service: api
            package: "@stock-tracker/api"
            dir: apps/api
            dockerfile: infra/docker/node-service.Dockerfile
          - service: subgraph-tracker
            package: "@stock-tracker/subgraph-tracker"
            dir: apps/subgraphs/tracker
            dockerfile: infra/docker/node-service.Dockerfile
          - service: router
            package: ""
            dir: ""
            dockerfile: apps/router/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Resolve tags
        id: tags
        run: |
          SHA="${{ github.sha }}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/stock-tracker-${{ matrix.service }}"
          echo "tags=${IMAGE}:${SHA},${IMAGE}:latest" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: ${{ matrix.package != '' && format('PACKAGE_NAME={0}\nAPP_DIR={1}', matrix.package, matrix.dir) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install redeploy deps
        run: npm install --prefix infra/railway

      - name: Trigger Railway redeploy
        run: npx --prefix infra/railway tsx infra/railway/src/redeploy.ts production
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
