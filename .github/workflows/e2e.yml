name: E2E

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    paths:
      - "apps/mobile/**"
      - "packages/**"

env:
  MAESTRO_VERSION: 2.4.0
  MAESTRO_APP_URL: http://localhost:8080

jobs:
  maestro-web:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Check for Maestro flows
        id: check-flows
        run: |
          if find apps/mobile/maestro -name '*.yaml' -o -name '*.yml' | grep -q .; then
            echo "has_flows=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_flows=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.check-flows.outputs.has_flows == 'true'
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.check-flows.outputs.has_flows == 'true'
        run: npm ci

      - name: Build packages
        if: steps.check-flows.outputs.has_flows == 'true'
        run: npx turbo run build --filter='./packages/*'

      - name: Export web app
        if: steps.check-flows.outputs.has_flows == 'true'
        env:
          EXPO_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJwbGFjZWhvbGRlciJ9.placeholder
          EXPO_PUBLIC_GRAPHQL_URL: http://localhost:4002
          EXPO_PUBLIC_GOOGLE_CLIENT_ID: placeholder.apps.googleusercontent.com
        run: npx expo export --platform web
        working-directory: apps/mobile

      - name: Serve web app
        if: steps.check-flows.outputs.has_flows == 'true'
        working-directory: apps/mobile
        run: npx serve@latest dist -p 8080 &

      - name: Install Maestro CLI
        if: steps.check-flows.outputs.has_flows == 'true'
        run: |
          curl -fsSL -o /tmp/maestro-install.sh "https://get.maestro.mobile.dev"
          bash /tmp/maestro-install.sh
          rm /tmp/maestro-install.sh

      - name: Start virtual display
        if: steps.check-flows.outputs.has_flows == 'true'
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          echo "DISPLAY=:99" >> "$GITHUB_ENV"

      - name: Wait for server
        if: steps.check-flows.outputs.has_flows == 'true'
        run: npx wait-on http://localhost:8080 --timeout 30000

      - name: Debug — capture browser output
        if: steps.check-flows.outputs.has_flows == 'true'
        run: |
          timeout 20 google-chrome-stable --headless=new --dump-dom --no-sandbox --disable-gpu --virtual-time-budget=10000 --enable-logging=stderr --v=0 http://localhost:8080 2>&1 || true

      - name: Run Maestro E2E tests
        if: steps.check-flows.outputs.has_flows == 'true'
        run: |
          export PATH="$PATH:$HOME/.maestro/bin"
          maestro test apps/mobile/maestro/

      - name: Upload Maestro test results
        if: always() && steps.check-flows.outputs.has_flows == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: maestro-test-results
          path: ~/.maestro/tests/
          retention-days: 7

      - name: Skip — no Maestro flows found
        if: steps.check-flows.outputs.has_flows == 'false'
        run: echo "No Maestro flow files found in apps/mobile/maestro/ — skipping E2E tests"
